{% extends "base.html" %}

{% block title %}Calendar - ChangeKeeper{% endblock %}

{% block content %}
<div class="calendar-container">
    <div class="page-header">
        <h1>Change Calendar</h1>
        <div class="header-actions">
            <a href="/changes/quick" class="btn btn-primary">Quick Log</a>
            <a href="/changes/new" class="btn btn-secondary">Full Change</a>
        </div>
    </div>

    <div class="calendar-nav">
        <button class="btn btn-secondary" id="prevMonth">&larr; Previous</button>
        <h2 id="calendarTitle"></h2>
        <button class="btn btn-secondary" id="nextMonth">Next &rarr;</button>
    </div>

    <div class="calendar-legend">
        <span class="legend-item"><span class="legend-dot dot-low"></span> Low</span>
        <span class="legend-item"><span class="legend-dot dot-medium"></span> Medium</span>
        <span class="legend-item"><span class="legend-dot dot-high"></span> High</span>
    </div>

    <div class="calendar-grid">
        <div class="calendar-header">
            <div class="calendar-day-name">Sun</div>
            <div class="calendar-day-name">Mon</div>
            <div class="calendar-day-name">Tue</div>
            <div class="calendar-day-name">Wed</div>
            <div class="calendar-day-name">Thu</div>
            <div class="calendar-day-name">Fri</div>
            <div class="calendar-day-name">Sat</div>
        </div>
        <div id="calendarBody" class="calendar-body"></div>
    </div>

    <!-- Day detail panel -->
    <div id="dayDetail" class="day-detail" style="display: none;">
        <div class="day-detail-header">
            <h3 id="dayDetailTitle"></h3>
            <button class="btn-close" onclick="closeDayDetail()">&times;</button>
        </div>
        <div id="dayDetailList" class="day-detail-list"></div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="/static/js/calendar.js?v=2.1.0"></script>
{% endblock %}
